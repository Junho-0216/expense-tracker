<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>비용기록 — Admin</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}" />
</head>
<body>
  <header class="topbar">
    <div class="topbar-inner">
      <strong>비용기록 Admin</strong>
      <span id="metaText" class="meta"></span>
    </div>
  </header>

  <main class="wrap">
    <section class="card">
      <h2>마지막 자동 실행</h2>
      <p id="lastAuto">불러오는 중…</p>
    </section>

    <section class="card">
      <h2>현재 시트 상태</h2>
      <div class="counts" id="counts">
        <div><span class="lbl">pending</span><b id="cntP">—</b></div>
        <div><span class="lbl">done</span><b id="cntD">—</b></div>
        <div><span class="lbl">error</span><b id="cntE">—</b></div>
        <div><span class="lbl">other</span><b id="cntO">—</b></div>
      </div>
    </section>

    <section class="card">
      <h2>일괄 처리</h2>
      <button id="processBtn" class="btn-primary">지금 일괄 처리</button>
      <p id="errBox" class="err" role="alert"></p>

      <div id="progressBox" class="progress" hidden>
        <progress id="progBar" value="0" max="100"></progress>
        <p id="progText">0 / 0</p>
        <ul id="errList" class="err-list"></ul>
      </div>
    </section>
  </main>

  <script>
    const $ = (id) => document.getElementById(id);

    async function loadStatus() {
      $("errBox").textContent = "";
      try {
        const res = await fetch("/api/status");
        const data = await res.json();
        if (!res.ok) throw new Error(data.error || "status 실패");
        $("cntP").textContent = data.counts ? data.counts.pending : "?";
        $("cntD").textContent = data.counts ? data.counts.done : "?";
        $("cntE").textContent = data.counts ? data.counts.error : "?";
        $("cntO").textContent = data.counts ? data.counts.other : "?";
        $("metaText").textContent = `시트 ${data.sheet_id?.slice(0, 12)}… · SA ${data.sa_path?.split("\\").pop()}`;
        const last = data.last_auto_run;
        if (last) {
          $("lastAuto").innerHTML =
            `시작: <b>${last.ran_at || "-"}</b><br>` +
            `완료: <b>${last.finished_at || "-"}</b><br>` +
            `total ${last.total} / done ${last.done} / errors <b>${last.errors}</b>`;
        } else {
          $("lastAuto").textContent = "기록 없음";
        }
        if (data.running) {
          $("progressBox").hidden = false;
          pollProgress();
        }
      } catch (e) {
        $("errBox").textContent = e.message;
      }
    }

    async function pollProgress() {
      const res = await fetch("/api/progress");
      const data = await res.json();
      const total = data.total || 0;
      const done = data.done || 0;
      const pct = total === 0 ? 0 : Math.round((done * 100) / total);
      $("progBar").value = pct;
      $("progText").textContent = `${done} / ${total} (${pct}%)`;

      const ul = $("errList");
      ul.innerHTML = "";
      (data.errors || []).forEach((e) => {
        const li = document.createElement("li");
        li.textContent = `행 ${e.row}: ${e.msg}`;
        ul.appendChild(li);
      });

      if (data.running) {
        setTimeout(pollProgress, 1000);
      } else {
        $("processBtn").disabled = false;
        $("processBtn").textContent = "지금 일괄 처리";
        loadStatus();
      }
    }

    $("processBtn").addEventListener("click", async () => {
      $("errBox").textContent = "";
      $("processBtn").disabled = true;
      $("processBtn").textContent = "처리 중…";
      $("progressBox").hidden = false;
      try {
        const res = await fetch("/api/process", { method: "POST" });
        const data = await res.json();
        if (!res.ok) throw new Error(data.error || "처리 시작 실패");
        pollProgress();
      } catch (e) {
        $("errBox").textContent = e.message;
        $("processBtn").disabled = false;
        $("processBtn").textContent = "지금 일괄 처리";
      }
    });

    loadStatus();
  </script>
</body>
</html>
